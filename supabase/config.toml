project_id = "alsama-lesson-planner"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
# Match your Supabase project's Postgres major version.
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/auth/callback"]
jwt_expiry = 3600
# Accounts are created by admin invite only — no public/self-serve sign-ups.
enable_signup = false

# Email + password is the only sign-in method. Teachers sign in with their Alsama
# email; accounts are provisioned via Supabase invite (which sets the password).
[auth.email]
enable_signup = false
enable_confirmations = true
secure_password_change = true

# Microsoft (Entra/Azure) SSO has been removed — sign-in is email + password.
