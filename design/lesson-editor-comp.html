document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

         <div style=\"margin-top: 10px;\">\n            <span style=\"font-size: 10.5px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; color: #A6917A;\">Daily outcome<\u002Fspan>\n            <div style=\"font-size: 15px; color: #3A332E; margin-top: 8px; line-height: 1.45; font-weight: 600;\">Investigate and demonstrate through reasoning and models that the sum of interior angles in any quadrilateral is 360°, and justify the conclusion using geometric evidence.<\u002Fdiv>\n            <div style=\"height: 1px; background: #EDE4D6; margin: 12px 0;\"><\u002Fdiv>\n            <div style=\"font-size: 11.5px; color: #8A7B66; line-height: 1.6;\"><b style=\"color: #6E6052;\">This week ·<\u002Fb> Analyse and synthesise understanding of angle properties — complementary, supplementary, adjacent and opposite — and their relationships within quadrilaterals. &nbsp;<b style=\"color: #6E6052;\">Monthly ·<\u002Fb> Apply and evaluate geometric and decimal concepts to solve real-world problems, justifying solutions through logical reasoning, visual models and accurate calculation.<\u002Fdiv>\n            <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px;\">\n              <div style=\"background: #fff; border: 1px solid #ECE4D7; border-radius: 10px; padding: 10px 12px;\"><div style=\"font-size: 10px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; color: #A6917A;\">Grammar &amp; vocabulary<\u002Fdiv><div style=\"font-size: 13px; color: #8A8178; margin-top: 5px;\">—<\u002Fdiv><\u002Fdiv>\n              <div style=\"background: #fff; border: 1px solid #ECE4D7; border-radius: 10px; padding: 10px 12px;\"><div style=\"font-size: 10px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; color: #A6917A;\">Theme<\u002Fdiv><div style=\"font-size: 13px; color: #3A332E; margin-top: 5px; line-height: 1.4;\">Properties of Shapes and Angles<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\ 6.2 1.8L12 18l-1.8-6.2L4 10l6.2-1.8z\"><\u002Fpath><\u002Fsvg> Check my objective<\u002Fbutton><\u002Fdiv>\n            <sc-if value=\"{{ checkObj }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"margin-top: 13px; background: #fff; border: 1px dashed #CFE6E0; border-radius: 12px; padding: 14px 15px;\">\n                <div style=\"font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: #186155; display: flex; align-items: center; gap: 7px; margin-bottom: 8px;\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"#1F7A6C\"><path d=\"M12 2l1.8 6.2L20 10l-6.2 1.8L12 18l-1.8-6.2L4 10l6.2-1.8z\"><\u002Fpath><\u002Fsvg> Quiet check<\u002Fdiv>\n                <div style=\"font-size: 13px; color: #3A332E; line-height: 1.55;\">Five of six marks met — specific, measurable (<i>show that they sum<\u002Fi>) and tangible. <b style=\"color:#B0651E;\">~ Time-bound<\u002Fb> — add a time, e.g. “…within the 20-minute practice.”<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- STEP 2 · TEACH IT -->\n        <sc-if value=\"{{ s2 }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap;\">\n            <div style=\"display: flex; align-items: center; gap: 10px;\"><span style=\"font-size: 21px; font-weight: 700;\">Teach the new content<\u002Fspan><span style=\"font-size: 11px; font-weight: 700; color: #1F7A6C; background: #E4F0ED; border: 1px solid #CFE6E0; border-radius: 6px; padding: 3px 9px;\">I DO → WE DO<\u002Fspan><\u002Fdiv>\n            <div style=\"display: inline-flex; align-items: center; gap: 7px;\"><span style=\"font-size: 11px; color: #756B64;\">min<\u002Fspan><div style=\"display: inline-flex; align-items: center; border: 1px solid #DDD4C8; border-radius: 8px; overflow: hidden; background: #fff;\"><button onclick=\"{{ newContentMinus }}\" style=\"width: 24px; height: 27px; border: none; background: #FBF8F3; color: #8A8178; font-size: 14px; cursor: pointer;\">−<\u002Fbutton><span style=\"padding: 0 9px; font-size: 13px; font-weight: 600;\">{{ newContentDur }}<\u002Fspan><button onclick=\"{{ newContentPlus }}\" style=\"width: 24px; height: 27px; border: none; background: #FBF8F3; color: #8A8178; font-size: 14px; cursor: pointer;\">+<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"margin-top: 18px;\"><label style=\"font-size: 12px; font-weight: 600; color: #756B64;\">What the teacher does<\u002Flabel><textarea class=\"lp\" rows=\"3\" style=\"margin-top: 6px;\">Draw three quadrilaterals on the board. Model splitting each into two triangles and reasoning that 2 × 180° = 360°.<\u002Ftextarea><\u002Fdiv>\n          <div style=\"margin-top: 14px;\"><label style=\"font-size: 12px; font-weight: 600; color: #756B64;\">What students do<\u002Flabel><textarea class=\"lp\" rows=\"3\" style=\"margin-top: 6px;\">Follow the split on their own shape, then explain to a partner why the four angles must add to 360°.<\u002Ftextarea><\u002Fdiv>\n          <div style=\"margin-top: 16px;\"><label style=\"font-size: 12px; font-weight: 600; color: #756B64;\">Attached from the bank<\u002Flabel>\n            <div style=\"margin-top: 6px; display: flex; align-items: center; gap: 11px; background: #F4FAF8; border: 1px solid #CFE6E0; border-radius: 10px; padding: 9px 11px;\"><span style=\"width: 30px; height: 30px; border-radius: 8px; background: #FBEFF3; color: #B62A5C; font-size: 9px; font-weight: 700; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0;\">PDF<\u002Fspan><div style=\"flex: 1; min-width: 0;\"><div style=\"font-size: 13px; font-weight: 500;\">Quadrilateral angle diagrams<\u002Fdiv><div style=\"font-size: 11px; color: #8A8178;\">Maths · Shapes · Diagrams<\u002Fdiv><\u002Fdiv><span style=\"font-size: 11px; font-weight: 600; color: #2E7D5B; display: inline-flex; align-items: center; gap: 4px;\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12l4 4 10-11\"><\u002Fpath><\u002Fsvg> Attached<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- STEP 3 · PRACTISE (teacher/students moved here; worksheet is on the right) -->\n        <sc-if value=\"{{ s3 }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap;\">\n            <div style=\"display: flex; align-items: center; gap: 10px;\"><span style=\"font-size: 21px; font-weight: 700;\">Practise<\u002Fspan><span style=\"display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 700; color: #B62A5C; background: #FBF2F5; border: 1px solid #F1D8E1; border-radius: 7px; padding: 5px 11px;\">You do <svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#B62A5C\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M6 9l6 6 6-6\"><\u002Fpath><\u002Fsvg><\u002Fspan><\u002Fdiv>\n            <div style=\"display: inline-flex; align-items: center; gap: 7px;\"><span style=\"font-size: 11px; color: #756B64;\">min<\u002Fspan><div style=\"display: inline-flex; align-items: center; border: 1px solid #DDD4C8; border-radius: 8px; overflow: hidden; background: #fff;\"><button onclick=\"{{ practiceMinus }}\" style=\"width: 24px; height: 27px; border: none; background: #FBF8F3; color: #8A8178; font-size: 14px; cursor: pointer;\">−<\u002Fbutton><span style=\"padding: 0 9px; font-size: 13px; font-weight: 600;\">{{ practiceDur }}<\u002Fspan><button onclick=\"{{ practicePlus }}\" style=\"width: 24px; height: 27px; border: none; background: #FBF8F3; color: #8A8178; font-size: 14px; cursor: pointer;\">+<\u002Fbutton><\u002Fdiv>                  <span style=\"display: inline-flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 10px; background: #F5EDE5; margin: 14px auto 10px;\"><svg width=\"19\" height=\"19\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#B0A08A\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 6h14M12 6v13\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n                    <div style=\"font-size: 13px; font-weight: 600; color: #3A332E;\">Start your exercise<\u002Fdiv>\n                    <div style=\"display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-top: 12px;\">\n                      <button style=\"font-family: inherit; font-size: 12px; font-weight: 500; color: #3A332E; background: #fff; border: 1px solid #DDD4C8; border-radius: 8px; padding: 7px 12px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px;\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#6E6052\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z\"><\u002Fpath><\u002Fsvg>Write it yourself<\u002Fbutton>\n                      <button style=\"font-family: inherit; font-size: 12px; font-weight: 500; color: #3A332E; background: #fff; border: 1px solid #DDD4C8; border-radius: 8px; padding: 7px 12px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px;\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#6E6052\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"4\" width=\"18\" height=\"16\" rx=\"2\"><\u002Frect><path d=\"M3 14l4-4 5 5 3-3 6 6\"><\u002Fpath><circle cx=\"8.5\" cy=\"9\" r=\"1.4\"><\u002Fcircle><\u002Fsvg>Insert image<\u002Fbutton>\n                      <button onclick=\"{{ b.toAi }}\" style=\"font-family: inherit; font-size: 12px; font-weight: 600; color: #fff; background: #1F7A6C; border: none; border-radius: 8px; padding: 7px 12px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px;\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"currentColor\"><path d=\"M12 2l1.6 5.6L19 9l-5.4 1.4L12 16l-1.6-5.6L5 9l5.4-1.4z\"><\u002Fpath><\u002Fsvg>Generate with Aya<\u002Fbutton>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n                <!-- AI state -->\n                <sc-if value=\"{{ b.isAi }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"padding: 16px;\">\n                    <div style=\"display: flex; align-items: center; gap: 8px;\"><span style=\"width: 24px; height: 24px; border-radius: 7px; background: #E4F0ED; display: inline-flex; align-items: center; justify-content: center;\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"#1F7A6C\"><path d=\"M12 2l1.6 5.6L19 9l-5.4 1.4L12 16l-1.6-5.6L5 9l5.4-1.4z\"><\u002Fpath><\u002Fsvg><\u002Fspan><span style=\"font-size: 14px; font-weight: 700;\">Generate with Aya<\u002Fspan><\u002Fdiv>\n                    <textarea class=\"lp\" rows=\"3\" style=\"margin-top: 12px;\" placeholder=\"Describe the resource you need\"><\u002Ftextarea>\n                    <div style=\"display: flex; align-items: center; gap: 12px; margin-top: 11px;\"><button onclick=\"{{ b.toFilled }}\" style=\"font-family: inherit; font-size: 12.5px; font-weight: 600; color: #fff; background: #1F7A6C; border: none; border-radius: 9px; padding: 9px 15px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px;\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"currentColor\"><path d=\"M12 2l1.6 5.6L19 9l-5.4 1.4L12 16l-1.6-5.6L5 9l5.4-1.4z\"><\u002Fpath><\u002Fsvg>Generate<\u002Fbutton><span onclick=\"{{ b.toEmpty }}\" style=\"font-size: 12.5px; color: #8A8178; cursor: pointer;\">Cancel<\u002Fspan><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n                <!-- filled state -->\n                <sc-if value=\"{{ b.isFilled }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"padding: 16px 18px;\">\n                    <div style=\"font-size: 14px; font-weight: 700; color: #B62A5C;\">{{ b.title }}<\u002Fdiv>\n                    <div style=\"font-size: 13.5px; line-height: 1.6; color: #2A2422; margin-top: 8px;\" contenteditable=\"true\" dir=\"auto\">Measure the four interior angles of each quadrilateral, then add them together. Write the total in the box.<\u002Fdiv>\n                    <div style=\"display: flex; gap: 12px; margin-top: 14px;\">\n                      <div style=\"flex: 1; height: 90px; border: 1px dashed #D8CBB6; border-radius: 8px; background: repeating-linear-gradient(45deg, #FBF8F3, #FBF8F3 6px, #F3ECE2 6px, #F3ECE2 12px);\"><\u002Fdiv>\n                      <div style=\"flex: 1; height: 90px; border: 1px dashed #D8CBB6; border-radius: 8px; background: repeating-linear-gradient(45deg, #FBF8F3, #FBF8F3 6px, #F3ECE2 6px, #F3ECE2 12px);\"><\u002Fdiv>\n                    <\u002Fdiv>\n                    <div style=\"display: flex; align-items: center; gap: 10px; margin-top: 12px; font-size: 13.5px;\">Total <span style=\"display: inline-block; width: 70px; height: 28px; border: 1.5px solid #C9B89F; border-radius: 6px;\"><\u002Fspan> = 360°<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n\n            <button onclick=\"{{ addBlock }}\" style=\"align-self: center; font-family: inherit; font-size: 12.5px; font-weight: 600; color: #186155; background: #E4F0ED; border: none; border-radius: 9px; padding: 8px 15px; margin: 4px 0 8px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px;\">＋ Add exercise<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n\n\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1440,&quot;height&quot;:960}}\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    this.state = {\n      step: 3, checkObj: true, leftW: 47, dragging: false,\n      durations: { homeworkCheck: 2, recap: 5, newContent: 10, cfu: 5, practice: 20, exitTicket: 5 },\n      cfu: '', exit: '', openMenu: null, reviewExpanded: { practice: true },\n      wsBlocks: [{ id: 1, mode: 'empty' }], nextId: 2,\n      objOpen: false,\n    };\n    this.STEPS = [\n      { label: 'SMARTT objective' },\n      { label: 'Teach it' },\n      { label: 'Practise' },\n      { label: 'Link it' },\n      { label: 'Review' },\n    ];\n  }\n  goStep(n) { this.setState({ step: Math.max(1, Math.min(5, n)) }); }\n  dur(k, d) { this.setState(s => ({ durations: { ...s.durations, [k]: Math.max(0, (s.durations[k] || 0) + d) } })); }\n  toggleReview(k) { this.setState(s => { const e = { ...s.reviewExpanded }; e[k] = !e[k]; return { reviewExpanded: e }; }); }\n\n  setBlockMode(id, mode) { this.setState(s => ({ wsBlocks: s.wsBlocks.map(b => b.id === id ? { ...b, mode } : b) })); }\n  addBlock() { this.setState(s => ({ wsBlocks: [...s.wsBlocks, { id: s.nextId, mode: 'empty' }], nextId: s.nextId + 1 })); }\n  delBlock(id) { this.setState(s => ({ wsBlocks: s.wsBlocks.length > 1 ? s.wsBlocks.filter(b => b.id !== id) : s.wsBlocks })); }\n\n  startDrag(e) {\n    e.preventDefault();\n    const el = this._split; if (!el) return;\n    const rect = el.getBoundingClientRect();\n    const move = (ev) => { let pct = ((ev.clientX - rect.left) / rect.width) * 100; pct = Math.max(32, Math.min(60, pct)); this.setState({ leftW: pct }); };\n    const up = () => { document.removeEventListener('pointermove', move); document.removeEventListener('pointerup', up); this.setState({ dragging: false }); };\n    document.addEventListener('pointermove', move); document.addEventListener('pointerup', up); this.setState({ dragging: true });\n  }\n\n  renderVals() {\n    const s = this.state, f = {}, d = s.durations;\n    const totalIn = 3 + d.homeworkCheck + d.recap + d.newContent + d.cfu + d.practice + d.exitTicket;\n    f.totalLabel = totalIn + ' / 50 min'; f.totalColor = totalIn === 50 ? '#2E7D5B' : '#B0651E';\n    ['homeworkCheck', 'recap', 'newContent', 'cfu', 'practice', 'exitTicket'].forEach(k => { f[k + 'Dur'] = d[k]; f[k + 'Plus'] = () => this.dur(k, 1); f[k + 'Minus'] = () => this.dur(k, -1); });\n\n    f.s1 = s.step === 1; f.s2 = s.step === 2; f.s3 = s.step === 3; f.s4 = s.step === 4; f.s5 = s.step === 5;\n    f.notFirst = s.step > 1; f.notLast = s.step < 5; f.atLast = s.step === 5;\n    f.backVis = s.step > 1 ? 'visible' : 'hidden';\n    f.hdrBorder = s.step === 1 ? '1px solid #EFE8DD' : 'none';\n    f.showObjToggle = s.step > 1;\n    f.objOpen = s.step === 1 ? true : s.objOpen;\n    f.objClosed = s.step > 1 && !s.objOpen;\n    f.objChev = (s.step === 1 || s.objOpen) ? { transform: 'rotate(90deg)' } : {};\n    f.toggleObj = () => this.setState(st => ({ objOpen: !st.objOpen }));\n    f.next = () => this.goStep(s.step + 1); f.back = () => this.goStep(s.step - 1);\n    f.nextLabel = s.step === 4 ? 'Review →' : 'Next →';\n    f.checkObj = s.checkObj; f.toggleCheck = () => this.setState(st => ({ checkObj: !st.checkObj }));\n    f.objectiveRef = (el) => { this._objEl = el; }; f.focusObjective = () => { if (this._objEl) this._objEl.focus(); };\n\n    f.wizSteps = this.STEPS.map((st, i) => {\n      const no = i + 1, isDone = s.step > no, isCur = s.step === no, isUpcoming = s.step < no, showConn = i < 4;\n      return { no, label: st.label, isDone, isCur, isUpcoming, showConnDone: showConn && isDone, showConnTodo: showConn && !isDone,\n        wrapStyle: showConn ? { display: 'flex', alignItems: 'center', flex: 1, minWidth: 0 } : { display: 'flex', alignItems: 'center', flexShrink: 0 }, go: () => this.goStep(no) };\n    });\n\n    const CFU_OPTIONS = ['Fist to Five', 'Whiteboard / Show Me', 'Think–Pair–Share', 'Hand Signals', 'Cold Call'];\n    const EXIT_OPTIONS = ['Draw It', 'Finish the Sentence', 'Three things I learned', 'One-sentence summary'];\n    f.hasCfu = !!s.cfu; f.noCfu = !s.cfu; f.cfuName = s.cfu;\n    f.cfuMenuOpen = s.openMenu === 'cfu'; f.cfuChev = s.openMenu === 'cfu' ? { transform: 'rotate(180deg)' } : {};\n    f.toggleCfuMenu = () => this.setState(st => ({ openMenu: st.openMenu === 'cfu' ? null : 'cfu' }));\n    f.clearCfu = () => this.setState({ cfu: '' });\n    f.cfuOptions = CFU_OPTIONS.map(n => ({ name: n, pick: () => this.setState({ cfu: n, openMenu: null }) }));\n    f.hasExit = !!s.exit; f.noExit = !s.exit; f.exitName = s.exit;\n    f.exitMenuOpen = s.openMenu === 'exit'; f.exitChev = s.openMenu === 'exit' ? { transform: 'rotate(180deg)' } : {};\n    f.toggleExitMenu = () => this.setState(st => ({ openMenu: st.openMenu === 'exit' ? null : 'exit' }));\n    f.clearExit = () => this.setState({ exit: '' });\n    f.exitOptions = EXIT_OPTIONS.map(n => ({ name: n, pick: () => this.setState({ exit: n, openMenu: null }) }));\n    f.menuOpen = !!s.openMenu; f.closeMenu = () => this.setState({ openMenu: null });\n\n    const phaseCol = { 'I do': { c: '#1F7A6C', bg: '#E4F0ED' }, 'We do': { c: '#B0651E', bg: '#F6ECDA' }, 'You do': { c: '#B62A5C', bg: '#F7E4EB' } };\n    const parts = [\n      { key: 'routines', name: 'Standard routines', detail: 'Anthem · Warm-up · Cool down — pre-filled and fixed.', phase: '', time: 3, fixed: true },\n      { key: 'homeworkCheck', name: 'Homework check', detail: \"Review yesterday's quadrilateral sorting.\", phase: '', time: d.homeworkCheck },\n      { key: 'recap', name: 'Recap', detail: 'Recall the angle sum of a triangle (180°).', phase: '', time: d.recap },\n      { key: 'newContent', name: 'New content', detail: 'Model splitting a quadrilateral into two triangles → 360°.', phase: 'I do', time: d.newContent },\n      { key: 'cfu', name: 'Check for Understanding', detail: (s.cfu || '—'), phase: 'We do', time: d.cfu },\n      { key: 'practice', name: 'Independent practice', detail: 'Measure and add the four angles on the worksheet, in pairs.', phase: 'You do', time: d.practice },\n      { key: 'exitTicket', name: 'Exit ticket', detail: (s.exit || '—'), phase: '', time: d.exitTicket },\n    ];\n    f.reviewParts = parts.map(p => { const pc = phaseCol[p.phase]; const open = !!s.reviewExpanded[p.key];\n      return { name: p.name, detail: p.detail, time: p.time, fixed: !!p.fixed, editable: !p.fixed, hasPhase: !!p.phase,\n        phase: p.phase, phaseColor: pc ? pc.c : '#8A8178', phaseBg: pc ? pc.bg : '#F1ECE3', open, chevStyle: open ? { transform: 'rotate(90deg)' } : {},\n        toggle: () => this.toggleReview(p.key), plus: () => this.dur(p.key, 1), minus: () => this.dur(p.key, -1) }; });\n\n    // split + worksheet\n    f.splitRef = (el) => { this._split = el; };\n    f.showWorksheet = s.step > 1;\n    f.leftPct = s.step === 1 ? 100 : s.leftW;\n    f.startDrag = (e) => this.startDrag(e);\n    f.dividerGrip = s.dragging ? '#1F7A6C' : '#C7BCAE';\n    f.dividerStyle = 'flex-shrink:0; width:12px; cursor:col-resize; display:flex; align-items:center; justify-content:center; background:' + (s.dragging ? '#DCEEE9' : '#EFE8DD') + '; transition:background 0.12s;';\n\n    f.wsBlocks = s.wsBlocks.map((b, i) => ({\n      title: 'Exercise ' + (i + 1),\n      isEmpty: b.mode === 'empty', isAi: b.mode === 'ai', isFilled: b.mode === 'filled',\n      toAi: () => this.setBlockMode(b.id, 'ai'), toFilled: () => this.setBlockMode(b.id, 'filled'), toEmpty: () => this.setBlockMode(b.id, 'empty'),\n      del: () => this.delBlock(b.id),\n    }));\n    f.addBlock = () => this.addBlock();\n    return f;\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
